<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VK Health Check</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #071316;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      width: min(520px, 100%);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 24px;
      background: rgba(255,255,255,.07);
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 8px 0; color: rgba(255,255,255,.78); line-height: 1.45; }
    code {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.28);
      color: #65fff3;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>VK Health Check OK</h1>
      <p>Эта страница не использует React, Firebase, Cloudinary, VK Bridge и backend.</p>
      <p>Если она открылась внутри VK Mini App, значит контейнер VK успешно загружает Vercel-домен.</p>
      <code id="url"></code>
    </section>
  </main>
  <script>
    document.getElementById("url").textContent = location.href;
  </script>
</body>
</html>
